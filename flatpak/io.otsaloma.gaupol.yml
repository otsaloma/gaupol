app-id: io.otsaloma.gaupol
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: gaupol
finish-args:
  - --device=dri
  - --filesystem=home
  - --filesystem=xdg-videos
  - --share=ipc
  - --socket=pulseaudio
  - --socket=wayland
  - --socket=x11
cleanup:
  - /include
  - /lib/girepository-1.0
  - /share/bash-completion
  - /share/doc
  - /share/fish
  - /share/gir-1.0
  - /share/man
  - /share/vala
  - /share/zsh
  - "*.la"
  - "*.a"
modules:

  # Spell-check

  - name: gspell
    buildsystem: autotools
    sources:
      - type: archive
        url: https://download.gnome.org/sources/gspell/1.9/gspell-1.9.1.tar.xz
        sha256: dcbb769dfdde8e3c0a8ed3102ce7e661abbf7ddf85df08b29915e92cd723abdd

  # Character encoding auto-detection

  # Generated with flatpak-pip-generator --runtime=org.gnome.Sdk//50 charset-normalizer -o python3-charset-normalizer --yaml
  - name: python3-charset-normalizer
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
        --prefix=${FLATPAK_DEST} "charset-normalizer" --no-build-isolation
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/e7/a1/67fe25fac3c7642725500a3f6cfe5821ad557c3abb11c9d20d12c7008d3e/charset_normalizer-3.4.7.tar.gz
        sha256: ae89db9e5f98a11a4bf50407d4363e7b09b31e55bc117b4f7d80aab97ba009e5

  # External video player: mpv

  - name: fribidi
    buildsystem: meson
    sources:
      - type: archive
        url: https://github.com/fribidi/fribidi/releases/download/v1.0.16/fribidi-1.0.16.tar.xz
        sha256: 1b1cde5b235d40479e91be2f0e88a309e3214c8ab470ec8a2744d82a5a9ea05c

  - name: libass
    buildsystem: meson
    cleanup: ["*"]
    sources:
      - type: archive
        url: https://github.com/libass/libass/releases/download/0.17.4/libass-0.17.4.tar.gz
        sha256: a886b3b80867f437bc55cff3280a652bfa0d37b43d2aff39ddf3c4f288b8c5a8

  - name: libplacebo
    buildsystem: meson
    config-opts:
      - -Ddemos=false
    sources:
      - type: git
        url: https://github.com/haasn/libplacebo.git
        tag: v7.360.1
        commit: cee9b076f2c63104ccfd497fa79c39a867293ec4

  - name: uchardet
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_STATIC=0
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    cleanup:
      - /bin
      - /lib/cmake
    sources:
      - type: archive
        url: https://www.freedesktop.org/software/uchardet/releases/uchardet-0.0.8.tar.xz
        sha256: e97a60cfc00a1c147a674b097bb1422abd9fa78a2d9ce3f3fdcc2e78a34ac5f0

  - name: mpv
    buildsystem: meson
    sources:
      - type: archive
        url: https://github.com/mpv-player/mpv/archive/v0.41.0.tar.gz
        sha256: ee21092a5ee427353392360929dc64645c54479aefdb5babc5cfbb5fad626209

  # Gaupol

  - name: gaupol
    buildsystem: simple
    build-commands:
      - python3 setup.py install --prefix=/app
      - sed -i 's|#!python|#!/usr/bin/env python3|' /app/bin/gaupol
    sources:
      - type: git
        url: https://github.com/otsaloma/gaupol.git
